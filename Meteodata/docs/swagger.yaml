      - description: Индекс станции
        in: query
        name: index
        type: string
      - description: Дата начала (Unix timestamp)
        in: query
        name: date_from
        type: integer
      - description: Дата окончания (Unix timestamp)
        in: query
        name: date_to
        type: integer
      - default: 100
        description: Лимит записей
        in: query
        name: limit
        type: integer
      - default: 0
        description: Смещение
        in: query
        name: offset
        type: integer
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Bad Request
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Получить LED измерения
      tags:
      - led
    post:
