        minimum: 1
        type: integer
      lat:
        type: number
      line_id:
        maxLength: 20
        minLength: 1
        type: string
      lon:
        type: number
      name:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  models.Region:
    properties:
      areas:
        items:
