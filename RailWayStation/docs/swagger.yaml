        type: integer
      id:
        type: integer
      name:
        type: string
      rail_stations:
        items:
          $ref: '#/definitions/models.RailStation'
        type: array
    type: object
  models.DistrictCreateRequest:
    properties:
      area_id:
        type: integer
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - area_id
    - name
    type: object
  models.DistrictUpdateRequest:
    properties:
      area_id:
        type: integer
      name:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  models.Line:
    properties:
      id:
        type: string
      name:
        type: string
      rail_stations:
        items:
          $ref: '#/definitions/models.RailStation'
        type: array
    type: object
  models.LineCreateRequest:
    properties:
      id:
        maxLength: 20
        minLength: 1
        type: string
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
    - id
    - name
    type: object
  models.LineUpdateRequest:
    properties:
      name:
        maxLength: 100
        minLength: 2
        type: string
    type: object
  models.RailStation:
    properties:
      district:
        $ref: '#/definitions/models.District'
      district_id:
        type: integer
      hash:
        type: string
      id:
        type: integer
      lat:
        type: number
      line:
        $ref: '#/definitions/models.Line'
      line_id:
        type: string
      lon:
        type: number
      name:
        type: string
    type: object
  models.RailStationCreateRequest:
    properties:
      district_id:
        minimum: 1
        type: integer
      lat:
        type: number
      line_id:
        maxLength: 20
        minLength: 1
        type: string
      lon:
        type: number
      name:
        maxLength: 100
        minLength: 2
        type: string
    required:
