# Конфигурация Nginx для API Gateway
events {
    worker_connections 1024;
}

http {
    upstream meteostation {
        server meteostation-service:8081;
    }

    upstream metedata {
        server metedata-service:8083;
    }

    upstream railwaystation {
        server railwaystation-service:8082;
    }

    # Основной сервер
    server {
        listen 80;
        server_name localhost;

        # Обработка запросов к метеостанциям
        location /api/meteostations {
            proxy_pass http://meteostation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Обработка запросов к метеоданным
        location /api/metedata {
            proxy_pass http://metedata;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Обработка запросов к железнодорожным станциям
        location /api/railway {
            proxy_pass http://railwaystation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Обработка запросов к анализу
        location /api/analyze {
            proxy_pass http://railwaystation;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Обработка запросов к файловому обработчику
        location /api/filehandler {
            proxy_pass http://filehandler-service:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Обработка статических файлов
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
            try_files $uri $uri/ /index.html;
        }
    }
}